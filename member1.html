<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecoveryGuard Member Check-In</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
      text-align: center;
      color: #1f2d3d;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: #ffffff;
      padding: 30px 20px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #4b5b6b;
    }

    input {
      padding: 12px;
      width: 80%;
      max-width: 320px;
      margin: 10px 0;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      background: #2a5d9f;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      opacity: 0.92;
    }

    .hidden {
      display: none;
    }

    .spinner {
      width: 180px;
      height: 180px;
      border: 10px solid #d9e2ec;
      border-top: 10px solid #2a5d9f;
      border-radius: 50%;
      margin: 25px auto 20px auto;
      transition: transform 3s ease-out;
    }

    #result {
      font-size: 26px;
      font-weight: bold;
      margin-top: 25px;
    }

    .selected {
      color: #b42318;
    }

    .not-selected {
      color: #027a48;
    }

    #log {
      text-align: left;
      margin-top: 30px;
      background: #f8fafc;
      padding: 18px;
      border-radius: 12px;
    }

    #log h3 {
      margin-top: 0;
    }

    #logList {
      padding-left: 20px;
    }

    #errorMsg {
      color: #b42318;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Member Check-In</h1>
    <p>Authorized members only.</p>

    <!-- Password Gate -->
    <div id="passwordSection">
      <input type="password" id="pagePassword" placeholder="Enter password">
      <br>
      <button onclick="checkPassword()">Enter</button>
      <div id="errorMsg"></div>
    </div>

    <!-- Member Section -->
    <div id="memberSection" class="hidden">
      <p>Please enter your Member ID, then complete your daily spin.</p>

      <input type="text" id="memberId" placeholder="Enter Member ID">
      <br>

      <div class="spinner" id="spinner"></div>

      <button onclick="spinWheel()">Spin</button>

      <div id="result"></div>

      <div id="log">
        <h3>Check-In Log</h3>
        <ul id="logList"></ul>
      </div>
    </div>
  </div>

  <script>
    const correctPassword = "RGAccess2026";

    function checkPassword() {
      const enteredPassword = document.getElementById("pagePassword").value;
      const errorMsg = document.getElementById("errorMsg");

      if (enteredPassword === correctPassword) {
        document.getElementById("passwordSection").classList.add("hidden");
        document.getElementById("memberSection").classList.remove("hidden");
      } else {
        errorMsg.textContent = "Incorrect password";
      }
    }

    function spinWheel() {
      const memberId = document.getElementById("memberId").value.trim();
      const spinner = document.getElementById("spinner");
      const result = document.getElementById("result");
      const logList = document.getElementById("logList");

      if (!memberId) {
        alert("Please enter your Member ID before spinning.");
        return;
      }

      const degrees = 1800 + Math.floor(Math.random() * 1440);
      spinner.style.transform = `rotate(${degrees}deg)`;

      setTimeout(() => {
        const selected = Math.random() < 0.2;
        const now = new Date();
        const timeStamp = now.toLocaleString();

        if (selected) {
          result.textContent = "SELECTED";
          result.className = "selected";
        } else {
          result.textContent = "NOT SELECTED";
          result.className = "not-selected";
        }

        const li = document.createElement("li");
        li.textContent = `${timeStamp} — ${memberId} — ${selected ? "SELECTED" : "NOT SELECTED"}`;
        logList.prepend(li);
      }, 3000);
    }
  </script>
</body>
</html>
